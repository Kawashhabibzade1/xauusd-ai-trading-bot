model_type: "lightgbm"
feature_count: 68
feature_config: "python_training/config/features.yaml"

lightgbm:
  objective: "multiclass"
  num_class: 3
  metric: "multi_logloss"
  boosting_type: "gbdt"
  num_leaves: 31
  learning_rate: 0.05
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 5
  verbose: -1
  seed: 42

training:
  test_split_ratio: 0.2
  num_boost_round: 200
  early_stopping_rounds: 20
  log_evaluation_period: 20
